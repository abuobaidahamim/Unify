<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unify – Edit Profile</title>
    <link rel="stylesheet" href="css/edit-profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="edit-card">
            <div class="brand">
                <h1>Edit Profile</h1>
            </div>
            <form id="editProfileForm">
                <!-- Profile Picture Upload -->
                <div class="form-section">
                    <h3>Profile Picture</h3>
                    <div class="profile-pic-upload">
                        <img id="profilePicPreview" src="https://placehold.co/100" alt="Profile Preview">
                        <div class="upload-controls">
                            <input type="file" id="profilePicInput" accept="image/jpeg,image/png,image/gif,image/webp">
                            <button type="button" id="uploadPicBtn" class="secondary-btn">Upload New Picture</button>
                            <p class="note">Accepted formats: JPG, PNG, GIF, WebP etc.</p>
                        </div>
                    </div>
                </div>

                <!-- Bio and Addresses -->
                <div class="form-section">
                    <h3>About You</h3>
                    <div class="input-group">
                        <label for="bio">Bio</label>
                        <textarea id="bio" placeholder="Tell something about yourself..."></textarea>
                    </div>
                    <div class="input-group">
                        <label for="currentLocation">Current Location</label>
                        <input type="text" id="currentLocation" placeholder="e.g., Dhaka, Bangladesh">
                    </div>
                    <div class="input-group">
                        <label for="permanentLocation">Permanent Location</label>
                        <input type="text" id="permanentLocation" placeholder="e.g., Chittagong">
                    </div>
                </div>

                <!-- Basic Information (same as profile-setup) -->
                <div class="form-section">
                    <h3>Basic Information</h3>
                    <div class="name-row">
                        <div class="input-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" required>
                        </div>
                        <div class="input-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>

                    <!-- University – only Daffodil International University -->
                    <div class="input-group">
                        <label for="university">University</label>
                        <select id="university" required>
                            <option value="" disabled>Select your university</option>
                            <option value="Daffodil International University">Daffodil International University</option>
                        </select>
                    </div>

                    <!-- Department dropdown (updated list) -->
                    <div class="input-group">
                        <label for="department">Department</label>
                        <select id="department" required>
                            <option value="" disabled selected>Select your department</option>
                            <option value="Software Engineering (SWE)">Software Engineering (SWE)</option>
                            <option value="Innovation & Entrepreneurship (IE)">Innovation & Entrepreneurship (IE)</option>
                            <option value="Computing and Information System (CIS)">Computing and Information System (CIS)</option>
                            <option value="Multimedia & Creative Technology (MCT)">Multimedia & Creative Technology (MCT)</option>
                            <option value="Information Technology & Management (ITM)">Information Technology & Management (ITM)</option>
                            <option value="Law">Law</option>
                            <option value="Journalism, Media and Communication (JMC)">Journalism, Media and Communication (JMC)</option>
                            <option value="Textile Engineering (TE)">Textile Engineering (TE)</option>
                            <option value="Architecture">Architecture</option>
                            <option value="Civil Engineering (CE)">Civil Engineering (CE)</option>
                            <option value="Pharmacy">Pharmacy</option>
                            <option value="Nutrition and Food Engineering (NFE)">Nutrition and Food Engineering (NFE)</option>
                            <option value="Computer Science & Engineering (CSE)">Computer Science & Engineering (CSE)</option>
                            <option value="Electrical & Electronic Engineering (EEE)">Electrical & Electronic Engineering (EEE)</option>
                        </select>
                    </div>

                    <!-- Major (dynamically populated) -->
                    <div class="input-group">
                        <label for="major">Major (if any)</label>
                        <select id="major">
                            <option value="" disabled selected>Select major (or None)</option>
                        </select>
                    </div>

                    <!-- Status (student/alumni) – always show batch -->
                    <div class="input-group">
                        <label>Status</label>
                        <div class="radio-group">
                            <label><input type="radio" name="status" value="student" required> Student</label>
                            <label><input type="radio" name="status" value="alumni"> Alumni</label>
                        </div>
                    </div>

                    <!-- Batch (always visible) -->
                    <div class="input-group">
                        <label for="batch">Batch</label>
                        <input type="text" id="batch" placeholder="e.g., 2024" required>
                    </div>

                    <!-- Employment Status (Job, Business, None) -->
                    <div class="input-group">
                        <label>Are you currently employed?</label>
                        <div class="radio-group">
                            <label><input type="radio" name="employment" value="job"> Job</label>
                            <label><input type="radio" name="employment" value="business"> Business</label>
                            <label><input type="radio" name="employment" value="none"> None</label>
                        </div>
                    </div>

                    <!-- Conditional fields for Job -->
                    <div class="conditional" id="jobFields" style="display: none;">
                        <div class="input-group">
                            <label for="company">Company</label>
                            <input type="text" id="company">
                        </div>
                        <div class="input-group">
                            <label for="role">Role</label>
                            <input type="text" id="role">
                        </div>
                    </div>

                    <!-- Conditional fields for Business (merged) -->
                    <div class="conditional" id="businessFields" style="display: none;">
                        <div class="input-group">
                            <label for="sector">Sector</label>
                            <input type="text" id="sector" placeholder="e.g., Tech, Education">
                        </div>
                        <div class="input-group">
                            <label for="businessType">Type of Business</label>
                            <input type="text" id="businessType" placeholder="e.g., Retail, Consulting">
                        </div>
                    </div>
                </div>

                <!-- Social Media Links -->
                <div class="form-section">
                    <h3>Social Media Links</h3>
                    <div class="input-group">
                        <label for="github">GitHub</label>
                        <input type="url" id="github" placeholder="https://github.com/username">
                    </div>
                    <div class="input-group">
                        <label for="linkedin">LinkedIn</label>
                        <input type="url" id="linkedin" placeholder="https://linkedin.com/in/username">
                    </div>
                    <div class="input-group">
                        <label for="facebook">Facebook</label>
                        <input type="url" id="facebook" placeholder="https://facebook.com/username">
                    </div>
                    <div class="input-group">
                        <label for="instagram">Instagram</label>
                        <input type="url" id="instagram" placeholder="https://instagram.com/username">
                    </div>
                    <div class="input-group">
                        <label for="x">X (Twitter)</label>
                        <input type="url" id="x" placeholder="https://x.com/username">
                    </div>
                </div>

                <button type="submit" class="save-btn">Save Changes</button>
            </form>

            <div class="login-link">
                <a href="personal-profile.html">Cancel</a>
            </div>
        </div>
    </div>

    <!-- Crop Modal -->
    <div id="cropModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close" id="cropModalClose">&times;</span>
            <h3>Crop Photo</h3>
            <div style="max-height: 400px; overflow: hidden;">
                <img id="cropImage" src="" style="max-width: 100%;">
            </div>
            <div style="margin-top: 15px; text-align: right;">
                <button class="secondary" id="cropCancel">Cancel</button>
                <button class="primary" id="cropSave">Save</button>
            </div>
        </div>
    </div>

    <!-- Firebase (unchanged) -->

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script type="module" src="js/edit-profile.js"></script>
</body>
</html>
