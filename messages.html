<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unify – Messages</title>
    <link rel="stylesheet" href="css/messages.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <img src="logo.jpeg" alt="Unify Logo" class="nav-logo">
            <span class="site-name">Unify</span>
        </div>
        <div class="nav-center">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search by name...">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
                <button id="filterBtn" class="filter-btn"><i class="fas fa-sliders-h"></i></button>
            </div>
            <!-- Filter Modal -->
            <div id="filterModal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h3>Filter Users</h3>
                    <div id="filterSteps"></div>
                </div>
            </div>
        </div>
        <div class="nav-right">
            <a href="home.html" class="nav-icon" data-tooltip="Home"><i class="fas fa-home"></i></a>
            <a href="connections.html" class="nav-icon" data-tooltip="Connections"><i class="fas fa-user-friends"></i></a>
            <a href="messages.html" class="nav-icon" data-tooltip="Messages">
                <i class="fas fa-envelope"></i>
                <span class="badge" id="messagesBadge" style="display: none;">0</span>
            </a>
            <a href="notifications.html" class="nav-icon" data-tooltip="Notifications">
                <i class="fas fa-bell"></i>
                <span class="badge" id="notificationsBadge" style="display: none;">0</span>
            </a>
            <div class="profile-icon" id="profileIcon">
                <img src="https://placehold.co/40" alt="Profile" id="navProfilePic">
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="messages-container">
        <h1 class="page-title">Messages</h1>
        <div id="conversationsList" class="conversations-list">
            <p>Loading conversations...</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAAlddaT4Lvy4Mq4gzsCyREuoE9J52WIcM",
            authDomain: "unify-8d6a4.firebaseapp.com",
            projectId: "unify-8d6a4",
            storageBucket: "unify-8d6a4.firebasestorage.app",
            messagingSenderId: "307932477498",
            appId: "1:307932477498:web:1f003e61cd355e77389d03"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <script type="module" src="js/messages.js"></script>
    <script type="module" src="js/filter.js"></script>
</body>
</html>
